version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --no-audit --no-fund
    build:
      commands:
        # Pass the app's runtime env vars (set in the Amplify console) through to
        # the Next.js server by writing them into .env.production at build time.
        # Amplify does not expose console env vars to the SSR runtime otherwise.
        - "env | grep -E '^(APP_AWS_REGION|APP_AWS_ACCESS_KEY_ID|APP_AWS_SECRET_ACCESS_KEY|LEADS_TABLE|REFERRALS_TABLE|PHOTOS_BUCKET|CHATS_TABLE|ADMIN_PASSWORD|NEXT_PUBLIC_GA_ID|MARKETCHECK_API_KEY|MARKET_CACHE_TABLE|MARKETCHECK_COUNTRY|MARKETCHECK_YEAR_WINDOW|MARKETCHECK_MIN_COMPS|MARKETCHECK_OFFER_LOW_OFFSET|MARKETCHECK_OFFER_HIGH_OFFSET|MARKETCHECK_CACHE_DAYS|MARKETCHECK_MONTHLY_BUDGET|MARKETCHECK_COST_PER_KM|MARKETCHECK_TIMEOUT_MS|TELEGRAM_BOT_TOKEN|TELEGRAM_CHAT_ID|TELEGRAM_WEBHOOK_SECRET|SESSION_SECRET|NEXT_PUBLIC_TURNSTILE_SITE_KEY|TURNSTILE_SECRET)=' >> .env.production || true"
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
